<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#222f3c"/>
      <stop offset="1" stop-color="#161e26"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe27a"/>
      <stop offset="1" stop-color="#ffce54"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8b73c"/>
      <stop offset="1" stop-color="#d49f28"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 付箋本体（角を1つ折った形） -->
  <g filter="url(#sh)">
    <path d="M120 132
             h222
             a16 16 0 0 1 16 16
             v176
             l-72 72
             h-166
             a16 16 0 0 1 -16 -16
             v-232
             a16 16 0 0 1 16 -16 z"
          fill="url(#paper)"/>
    <!-- 折り返し -->
    <path d="M358 324 l-72 72 v-56 a16 16 0 0 1 16 -16 z" fill="url(#fold)"/>
  </g>

  <!-- チェックリストの線 -->
  <g stroke="#7a6418" stroke-width="14" stroke-linecap="round" opacity="0.55">
    <line x1="156" y1="196" x2="312" y2="196"/>
    <line x1="156" y1="244" x2="312" y2="244"/>
    <line x1="156" y1="292" x2="270" y2="292"/>
  </g>
  <!-- 一番上だけチェック済み（取り消し線＋緑チェック風） -->
  <circle cx="156" cy="196" r="0"/>

  <!-- 赤い「残」バッジ -->
  <g filter="url(#sh)">
    <circle cx="372" cy="158" r="74" fill="#e8654b"/>
    <circle cx="372" cy="158" r="74" fill="none" stroke="#fff" stroke-width="6" opacity="0.9"/>
    <text x="372" y="190" font-family="Noto Sans CJK JP"
          font-size="84" font-weight="900" fill="#fff" text-anchor="middle">残</text>
  </g>
</svg>
