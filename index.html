<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1b2733">
<title>プロジェクト付箋</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
:root{
  --bg:#161e26;--panel:#1f2a35;--panel2:#26333f;--line:#33424f;
  --ink:#e8edf1;--sub:#8fa1b0;--alert:#e8654b;--done:#4cc38a;
  --accent:#ffce54;--routine:#ffce54;--miss:#52606b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);
  font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  padding-bottom:90px;-webkit-text-size-adjust:100%}
header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#1b2733,#161e26);
  padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;border-bottom:1px solid var(--line)}
.h-title{font-size:19px;font-weight:800;letter-spacing:.04em;display:flex;align-items:center;gap:8px}
.h-title .dot{width:9px;height:9px;border-radius:2px;background:var(--accent);transform:rotate(45deg)}
.h-sub{font-size:12px;color:var(--sub);margin-top:3px;display:flex;align-items:center;gap:6px}
.sync{font-size:11px;color:var(--sub)}
.sync.ok{color:var(--done)} .sync.err{color:var(--alert)} .sync.busy{color:var(--accent)}
.wrap{padding:14px 14px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:14px 13px 13px;min-height:112px;display:flex;flex-direction:column;justify-content:space-between;
  overflow:hidden;cursor:pointer;transition:transform .08s}
.card:active{transform:scale(.97)}
.card .corner{position:absolute;top:0;right:0;width:0;height:0;border-style:solid;
  border-width:0 26px 26px 0;border-color:transparent var(--line) transparent transparent}
.card.alert{border-color:#5a3a32}
.card.alert .corner{border-color:transparent var(--alert) transparent transparent}
.card.clear{border-color:#2f4a3e}
.card.clear .corner{border-color:transparent var(--done) transparent transparent}
.card .pname{font-size:15px;font-weight:700;line-height:1.3;word-break:break-word;padding-right:18px}
.card .meta{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.badge{font-size:22px;font-weight:800;line-height:1;display:flex;align-items:baseline;gap:3px}
.badge.alert{color:var(--alert)} .badge.clear{color:var(--done)}
.badge .u{font-size:11px;font-weight:600;color:var(--sub)} .badge.clear .ck{font-size:20px}
.card .tag{font-size:11px;color:var(--sub);background:var(--panel2);padding:3px 8px;border-radius:20px}
.routine-line{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:12px}
.routine-line .rdot{width:7px;height:7px;border-radius:50%;background:var(--routine)}
.routine-line.miss{color:var(--routine);font-weight:700}
.routine-line.met{color:var(--sub)} .routine-line.met .rdot{background:var(--done)}
.empty{color:var(--sub);text-align:center;padding:60px 20px;font-size:14px;line-height:1.7}
.fab{position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom) + 22px);width:58px;height:58px;
  border-radius:50%;border:none;background:var(--accent);color:#2a2410;font-size:30px;font-weight:600;
  box-shadow:0 6px 18px rgba(0,0,0,.4);z-index:20}
.fab:active{transform:scale(.92)}
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:30;display:none;align-items:flex-end}
.sheet-bg.on{display:flex}
.sheet{background:var(--panel);width:100%;max-height:90vh;border-radius:18px 18px 0 0;
  border-top:1px solid var(--line);padding:18px 16px calc(env(safe-area-inset-bottom) + 18px);
  overflow-y:auto;animation:up .22s ease}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.sheet h2{font-size:17px;margin:2px 0 4px;font-weight:800}
.sheet .back{font-size:13px;color:var(--sub);background:none;border:none;padding:4px 0;margin-bottom:6px}
input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:10px;padding:13px 12px;font-size:15px}
input::placeholder{color:#6b7c8a}
.row{display:flex;gap:9px;margin-top:10px}
.btn{flex:1;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700}
.btn.primary{background:var(--accent);color:#2a2410} .btn.ghost{background:var(--panel2);color:var(--ink)}
.btn:active{opacity:.8}
.sec-head{display:flex;align-items:center;gap:8px;margin:20px 0 4px;font-size:13px;font-weight:800;
  color:var(--sub);letter-spacing:.05em}
.sec-head .bar{width:3px;height:14px;border-radius:2px;background:var(--alert)}
.sec-head.routine .bar{background:var(--routine)}
.sec-head .cnt{margin-left:auto;font-weight:600;color:var(--sub)}
.titem{display:flex;align-items:flex-start;gap:11px;padding:13px 4px;border-bottom:1px solid var(--line)}
.chk{width:24px;height:24px;border-radius:7px;border:2px solid var(--sub);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:15px;color:transparent;transition:.12s}
.titem .txt{font-size:15px;line-height:1.4;flex:1;word-break:break-word}
.titem .del{color:#7a8a97;background:none;border:none;font-size:17px;padding:2px 4px}
.ritem{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line)}
.ritem .chk{border-radius:50%;width:26px;height:26px}
.ritem.done .chk{background:var(--routine);border-color:var(--routine);color:#3a2f08}
.ritem .rbody{flex:1;min-width:0}
.ritem .rtxt{font-size:15px;line-height:1.3;word-break:break-word}
.ritem.done .rtxt{color:var(--sub)}
.dots{display:flex;gap:4px;margin-top:5px}
.dots .d{width:9px;height:9px;border-radius:2px;background:var(--miss)}
.dots .d.ok{background:var(--done)}
.dots .d.today{outline:2px solid var(--accent);outline-offset:1px}
.ritem .del{color:#7a8a97;background:none;border:none;font-size:17px;padding:2px 4px}
.addrow{display:flex;gap:8px;margin:12px 0 4px}
.addrow input{flex:1}
.addrow .add{color:#2a2410;border:none;border-radius:10px;padding:0 18px;font-size:24px;font-weight:600}
.addrow .add.task{background:var(--alert);color:#fff} .addrow .add.routine{background:var(--routine)}
.proj-actions{display:flex;justify-content:space-between;align-items:center;margin-top:22px;
  padding-top:14px;border-top:1px solid var(--line)}
.proj-actions .del-proj{background:none;border:none;color:var(--alert);font-size:13px}
.muted{font-size:12px;color:var(--sub);margin-top:6px;line-height:1.5}
.loading{text-align:center;color:var(--sub);padding:80px 20px;font-size:14px}
/* ログイン画面 */
#auth{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;
  flex-direction:column;justify-content:center;align-items:center;padding:24px}
#auth.on{display:flex}
.auth-box{width:100%;max-width:360px}
.auth-logo{font-size:24px;font-weight:800;text-align:center;margin-bottom:4px;display:flex;
  align-items:center;justify-content:center;gap:8px}
.auth-logo .dot{width:11px;height:11px;border-radius:2px;background:var(--accent);transform:rotate(45deg)}
.auth-sub{font-size:13px;color:var(--sub);text-align:center;margin-bottom:28px}
.auth-box label{display:block;font-size:13px;color:var(--sub);margin:14px 0 5px}
.auth-box input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:10px;padding:14px 12px;font-size:16px}
.auth-btn{width:100%;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:700;
  background:var(--accent);color:#2a2410;margin-top:22px}
.auth-btn:active{opacity:.85}
.auth-btn:disabled{opacity:.5}
.auth-switch{text-align:center;margin-top:18px;font-size:14px;color:var(--sub)}
.auth-switch button{background:none;border:none;color:var(--accent);font-size:14px;font-weight:700;text-decoration:underline}
.auth-msg{margin-top:16px;font-size:13px;text-align:center;min-height:18px}
.auth-msg.err{color:var(--alert)} .auth-msg.ok{color:var(--done)}
.auth-foot{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 14px);left:0;right:0;
  text-align:center;font-size:11px;color:#5a6a77}
</style>
</head>
<body>
<!-- ログイン画面 -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-logo"><span class="dot"></span>プロジェクト付箋</div>
    <div class="auth-sub" id="auth-mode-sub">ログインして始めましょう</div>
    <label>メールアドレス</label>
    <input type="email" id="auth-email" autocomplete="email" placeholder="you@example.com">
    <label>パスワード</label>
    <input type="password" id="auth-pass" autocomplete="current-password" placeholder="6文字以上" onkeydown="if(event.key==='Enter')doAuth()">
    <button class="auth-btn" id="auth-submit" onclick="doAuth()">ログイン</button>
    <div class="auth-msg" id="auth-msg"></div>
    <div class="auth-switch">
      <span id="auth-switch-text">アカウントをお持ちでない方は</span>
      <button onclick="toggleAuthMode()" id="auth-switch-btn">新規登録</button>
    </div>
  </div>
  <div class="auth-foot">tamulab</div>
</div>

<header>
  <div class="h-title"><span class="dot"></span>プロジェクト付箋
    <button onclick="logout()" style="margin-left:auto;background:var(--panel2);border:1px solid var(--line);color:var(--sub);font-size:12px;padding:5px 11px;border-radius:16px">ログアウト</button>
  </div>
  <div class="h-sub">やり残しと、今日の日課が、ひと目でわかる
    <span class="sync" id="sync">●</span></div>
</header>

<div class="wrap">
  <div id="loading" class="loading">読み込み中…</div>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none">
    まだプロジェクトがありません。<br>右下の＋から追加してください。
  </div>
</div>

<button class="fab" onclick="openNewProject()">＋</button>

<div class="sheet-bg" id="np-bg">
  <div class="sheet">
    <h2>新しいプロジェクト</h2>
    <input type="text" id="np-name" placeholder="プロジェクト名（例：○○社 配送案件）" maxlength="40">
    <div class="row">
      <button class="btn ghost" onclick="closeSheet('np-bg')">やめる</button>
      <button class="btn primary" onclick="createProject()">追加する</button>
    </div>
  </div>
</div>

<div class="sheet-bg" id="pd-bg">
  <div class="sheet">
    <button class="back" onclick="closeSheet('pd-bg')">← 一覧へ戻る</button>
    <h2 id="pd-title"></h2>
    <div class="sec-head routine"><span class="bar"></span>毎日の日課<span class="cnt" id="r-cnt"></span></div>
    <div id="pd-rlist"></div>
    <div class="addrow">
      <input type="text" id="pd-newroutine" placeholder="毎日やることを追加" maxlength="60"
        onkeydown="if(event.key==='Enter')addRoutine()">
      <button class="add routine" onclick="addRoutine()">＋</button>
    </div>
    <div class="muted">日付が変わると未チェックに戻ります。下の四角は直近7日の実施記録（緑=やった日／右端が今日）。</div>
    <div class="sec-head"><span class="bar"></span>やり残し（付箋）<span class="cnt" id="t-cnt"></span></div>
    <div id="pd-tlist"></div>
    <div class="addrow">
      <input type="text" id="pd-newtask" placeholder="一回限りのやることを追加" maxlength="80"
        onkeydown="if(event.key==='Enter')addTask()">
      <button class="add task" onclick="addTask()">＋</button>
    </div>
    <div class="proj-actions">
      <button class="del-proj" onclick="deleteProject()">このプロジェクトを削除</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://hyvjvcdahahrznhujtaz.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5dmp2Y2RhaGFocnpuaHVqdGF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTE3MDcsImV4cCI6MjA5NTQyNzcwN30.Zdl8yaFH64xEbiEzi7v8dsd2iu3CKaH96TBNqigJZV4';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let state=[];           // [{id,name,tasks:[{id,text}],routines:[{id,text,log:[date]}]}]
let currentId=null;
let ready=false;

function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dateKey(off){const d=new Date();d.setDate(d.getDate()-off);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function setSync(cls,txt){const e=document.getElementById('sync');e.className='sync '+cls;e.textContent=txt||'●'}

/* ---------- 認証（メール＋パスワード）＆初期ロード ---------- */
let authMode='login';  // 'login' or 'signup'

async function init(){
  setSync('busy','接続中');
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    // ログイン済み → アプリ起動
    showApp();
    await loadAll();
  }else{
    // 未ログイン → ログイン画面
    showAuth();
  }
}

function showAuth(){
  document.getElementById('auth').classList.add('on');
  document.getElementById('loading').style.display='none';
  setSync('','●');
}
function showApp(){
  document.getElementById('auth').classList.remove('on');
}

function toggleAuthMode(){
  authMode=(authMode==='login')?'signup':'login';
  const isLogin=authMode==='login';
  document.getElementById('auth-mode-sub').textContent=isLogin?'ログインして始めましょう':'アカウントを新規作成します';
  document.getElementById('auth-submit').textContent=isLogin?'ログイン':'新規登録する';
  document.getElementById('auth-switch-text').textContent=isLogin?'アカウントをお持ちでない方は':'すでにアカウントをお持ちの方は';
  document.getElementById('auth-switch-btn').textContent=isLogin?'新規登録':'ログイン';
  document.getElementById('auth-pass').setAttribute('autocomplete',isLogin?'current-password':'new-password');
  setAuthMsg('','');
}
function setAuthMsg(cls,txt){const e=document.getElementById('auth-msg');e.className='auth-msg '+cls;e.textContent=txt}

async function doAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const btn=document.getElementById('auth-submit');
  if(!email||!pass){setAuthMsg('err','メールアドレスとパスワードを入力してください');return}
  if(pass.length<6){setAuthMsg('err','パスワードは6文字以上にしてください');return}
  btn.disabled=true;setAuthMsg('','処理中…');
  try{
    let error;
    if(authMode==='signup'){
      ({error}=await sb.auth.signUp({email,password:pass}));
      if(error)throw error;
      // Confirm email OFF の場合は signUp で即セッションが張られる
    }else{
      ({error}=await sb.auth.signInWithPassword({email,password:pass}));
      if(error)throw error;
    }
    const {data:{session}}=await sb.auth.getSession();
    if(!session){
      // メール確認ONなどでセッションが張られなかった場合
      setAuthMsg('ok','登録しました。ログインしてください');
      authMode='login';toggleAuthMode();toggleAuthMode();
      btn.disabled=false;return;
    }
    setAuthMsg('ok','ログインしました');
    showApp();
    await loadAll();
  }catch(e){
    let msg='ログインに失敗しました';
    const m=(e&&e.message)||'';
    if(m.includes('Invalid login'))msg='メールアドレスかパスワードが違います';
    else if(m.includes('already registered')||m.includes('already been registered'))msg='このメールアドレスは登録済みです。ログインしてください';
    else if(m.includes('valid email'))msg='メールアドレスの形式が正しくありません';
    else if(m)msg=m;
    setAuthMsg('err',msg);
  }
  btn.disabled=false;
}

async function logout(){
  if(!confirm('ログアウトしますか？'))return;
  await sb.auth.signOut();
  state=[];render();
  document.getElementById('auth-email').value='';
  document.getElementById('auth-pass').value='';
  setAuthMsg('','');
  showAuth();
}

async function loadAll(){
  setSync('busy','同期中');
  try{
    const [{data:projs},{data:tasks},{data:routines},{data:logs}]=await Promise.all([
      sb.from('pm_projects').select('*').order('sort_order'),
      sb.from('pm_tasks').select('*').eq('done',false),
      sb.from('pm_routines').select('*').order('sort_order'),
      sb.from('pm_routine_logs').select('*').gte('done_date',dateKey(6))
    ]);
    const logsByR={};
    (logs||[]).forEach(l=>{(logsByR[l.routine_id]=logsByR[l.routine_id]||[]).push(l.done_date)});
    const tasksByP={},routinesByP={};
    (tasks||[]).forEach(t=>{(tasksByP[t.project_id]=tasksByP[t.project_id]||[]).push({id:t.id,text:t.text})});
    (routines||[]).forEach(r=>{(routinesByP[r.project_id]=routinesByP[r.project_id]||[]).push({id:r.id,text:r.text,log:logsByR[r.id]||[]})});
    state=(projs||[]).map(p=>({id:p.id,name:p.name,tasks:tasksByP[p.id]||[],routines:routinesByP[p.id]||[]}));
    ready=true;
    document.getElementById('loading').style.display='none';
    render();setSync('ok','同期済');
  }catch(e){setSync('err','同期エラー');console.error(e)}
}

/* ---------- 表示 ---------- */
function remain(p){return p.tasks.length}
function routineDoneToday(p){const t=today();return p.routines.filter(r=>(r.log||[]).includes(t)).length}

function render(){
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  grid.innerHTML='';
  if(state.length===0){empty.style.display='block';return}
  empty.style.display='none';
  const sorted=[...state].sort((a,b)=>{
    const ra=remain(a),rb=remain(b);
    if((ra>0)!==(rb>0))return ra>0?-1:1;return rb-ra;
  });
  for(const p of sorted){
    const r=remain(p);
    const card=document.createElement('div');
    card.className='card '+(r>0?'alert':(p._everHadTask?'clear':''));
    card.onclick=()=>openProject(p.id);
    let badge;
    if(r>0){badge=`<div class="badge alert">${r}<span class="u">残</span></div>`}
    else{badge=`<div class="badge"><span class="u" style="font-size:13px">残なし</span></div>`}
    let rline='';
    if(p.routines.length>0){
      const rd=routineDoneToday(p),all=p.routines.length,met=rd===all;
      rline=`<div class="routine-line ${met?'met':'miss'}"><span class="rdot"></span>今日の日課 ${rd}/${all}${met?' 完了':''}</div>`;
    }
    card.innerHTML=`<span class="corner"></span>
      <div class="pname">${esc(p.name)}</div>
      <div><div class="meta">${badge}<span class="tag">付箋${p.tasks.length}</span></div>${rline}</div>`;
    grid.appendChild(card);
  }
}

function openNewProject(){document.getElementById('np-name').value='';document.getElementById('np-bg').classList.add('on');setTimeout(()=>document.getElementById('np-name').focus(),100)}
async function createProject(){
  const name=document.getElementById('np-name').value.trim();if(!name)return;
  closeSheet('np-bg');setSync('busy','保存中');
  const {data,error}=await sb.from('pm_projects').insert({name,sort_order:state.length}).select().single();
  if(error){setSync('err','保存失敗');alert('保存に失敗しました');return}
  state.push({id:data.id,name:data.name,tasks:[],routines:[]});
  render();setSync('ok','同期済');
}

function openProject(id){currentId=id;renderDetail();document.getElementById('pd-bg').classList.add('on')}

function renderDetail(){
  const p=state.find(x=>x.id===currentId);if(!p){closeSheet('pd-bg');return}
  document.getElementById('pd-title').textContent=p.name;
  const rlist=document.getElementById('pd-rlist');rlist.innerHTML='';
  const t=today();
  for(const r of p.routines){
    const log=r.log||[],doneToday=log.includes(t);
    const row=document.createElement('div');row.className='ritem '+(doneToday?'done':'');
    let dots='';for(let i=6;i>=0;i--){const dk=dateKey(i),ok=log.includes(dk);dots+=`<span class="d ${ok?'ok':''} ${i===0?'today':''}"></span>`}
    row.innerHTML=`<div class="chk">✓</div><div class="rbody"><div class="rtxt">${esc(r.text)}</div><div class="dots">${dots}</div></div><button class="del">×</button>`;
    row.querySelector('.chk').onclick=()=>toggleRoutine(r.id);
    row.querySelector('.rtxt').onclick=()=>toggleRoutine(r.id);
    row.querySelector('.del').onclick=(e)=>{e.stopPropagation();delRoutine(r.id)};
    rlist.appendChild(row);
  }
  document.getElementById('r-cnt').textContent=p.routines.length===0?'未設定':`今日 ${routineDoneToday(p)}/${p.routines.length}`;
  const list=document.getElementById('pd-tlist');list.innerHTML='';
  for(const tk of p.tasks){
    const row=document.createElement('div');row.className='titem';
    row.innerHTML=`<div class="chk">✓</div><div class="txt">${esc(tk.text)}</div><button class="del">×</button>`;
    row.querySelector('.chk').onclick=()=>completeTask(tk.id);
    row.querySelector('.del').onclick=(e)=>{e.stopPropagation();delTask(tk.id)};
    list.appendChild(row);
  }
  document.getElementById('t-cnt').textContent=p.tasks.length===0?'なし':`残り ${p.tasks.length}件`;
}

/* ---------- 日課 ---------- */
async function addRoutine(){
  const inp=document.getElementById('pd-newroutine');const text=inp.value.trim();if(!text)return;
  const p=state.find(x=>x.id===currentId);inp.value='';setSync('busy','保存中');
  const {data,error}=await sb.from('pm_routines').insert({project_id:p.id,text,sort_order:p.routines.length}).select().single();
  if(error){setSync('err','保存失敗');return}
  p.routines.push({id:data.id,text:data.text,log:[]});renderDetail();render();setSync('ok','同期済');inp.focus();
}
async function toggleRoutine(rid){
  const p=state.find(x=>x.id===currentId);const r=p.routines.find(x=>x.id===rid);
  if(!r.log)r.log=[];const t=today();const was=r.log.includes(t);
  if(was)r.log=r.log.filter(d=>d!==t);else r.log.push(t);
  renderDetail();render();setSync('busy','保存中');
  let error;
  if(was){({error}=await sb.from('pm_routine_logs').delete().eq('routine_id',rid).eq('done_date',t))}
  else{({error}=await sb.from('pm_routine_logs').insert({routine_id:rid,done_date:t}))}
  setSync(error?'err':'ok',error?'保存失敗':'同期済');
}
async function delRoutine(rid){
  if(!confirm('この日課を削除しますか？記録も消えます'))return;
  const p=state.find(x=>x.id===currentId);p.routines=p.routines.filter(x=>x.id!==rid);
  renderDetail();render();setSync('busy','削除中');
  const {error}=await sb.from('pm_routines').delete().eq('id',rid);
  setSync(error?'err':'ok',error?'削除失敗':'同期済');
}

/* ---------- 付箋 ---------- */
let undoTimer=null;
async function addTask(){
  const inp=document.getElementById('pd-newtask');const text=inp.value.trim();if(!text)return;
  const p=state.find(x=>x.id===currentId);inp.value='';setSync('busy','保存中');
  const {data,error}=await sb.from('pm_tasks').insert({project_id:p.id,text}).select().single();
  if(error){setSync('err','保存失敗');return}
  p.tasks.push({id:data.id,text:data.text});renderDetail();render();setSync('ok','同期済');inp.focus();
}
async function completeTask(tid){
  const p=state.find(x=>x.id===currentId);const tk=p.tasks.find(x=>x.id===tid);if(!tk)return;
  const snap={pid:p.id,text:tk.text};
  p.tasks=p.tasks.filter(x=>x.id!==tid);renderDetail();render();setSync('busy','保存中');
  const {error}=await sb.from('pm_tasks').update({done:true}).eq('id',tid);
  setSync(error?'err':'ok',error?'保存失敗':'同期済');
  showUndo(snap,tid);
}
async function delTask(tid){
  const p=state.find(x=>x.id===currentId);p.tasks=p.tasks.filter(x=>x.id!==tid);
  renderDetail();render();setSync('busy','削除中');
  const {error}=await sb.from('pm_tasks').delete().eq('id',tid);
  setSync(error?'err':'ok',error?'削除失敗':'同期済');
}
function showUndo(snap,tid){
  let bar=document.getElementById('undobar');
  if(!bar){bar=document.createElement('div');bar.id='undobar';document.body.appendChild(bar);
    bar.style.cssText='position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 96px);background:#2b3742;color:#e8edf1;padding:11px 14px;border-radius:24px;font-size:14px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 16px rgba(0,0,0,.45);z-index:50;border:1px solid #3a4a57'}
  bar.innerHTML=`<span>1件 完了</span>`;
  const u=document.createElement('button');u.textContent='↩ 戻す';
  u.style.cssText='background:none;border:none;color:#ffce54;font-size:14px;font-weight:700;padding:0';
  u.onclick=async()=>{
    const p=state.find(x=>x.id===snap.pid);
    const {error}=await sb.from('pm_tasks').update({done:false}).eq('id',tid);
    if(!error&&p){p.tasks.push({id:tid,text:snap.text});renderDetail();render()}
    hideUndo();
  };
  bar.appendChild(u);bar.style.display='flex';
  clearTimeout(undoTimer);undoTimer=setTimeout(hideUndo,4000);
}
function hideUndo(){const b=document.getElementById('undobar');if(b)b.style.display='none'}

async function deleteProject(){
  if(!confirm('このプロジェクトを削除しますか？'))return;
  const id=currentId;state=state.filter(x=>x.id!==id);closeSheet('pd-bg');render();setSync('busy','削除中');
  const {error}=await sb.from('pm_projects').delete().eq('id',id);
  setSync(error?'err':'ok',error?'削除失敗':'同期済');
}
function closeSheet(id){document.getElementById(id).classList.remove('on')}
document.querySelectorAll('.sheet-bg').forEach(bg=>{bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('on')})});

init();
</script>
</body>
</html>
